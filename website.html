<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website - WebHunt</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/website.css">
</head>
<body>

<header>

    <div class="logo">
        🌐 <span>WebHunt</span>
    </div>

    <nav id="navbar">

    <a href="index.html">Home</a>

    <a href="#">Categories</a>

    <a href="#">Collections</a>

    <a href="favorites.html">Favorites</a>

    <span id="authLinks">
        <a href="account.html">Login</a>
    </span>

    </nav>

</header>

<main class="website-container">

    <section class="website-header">

        <img id="websiteLogo" src="" alt="Logo">

        <div>

            <span id="websiteCategory" class="category"></span>

            <h1 id="websiteName"></h1>

            <div class="website-meta">

                <span id="websiteRating">⭐ 0.0</span>

                <span id="websiteViews">👁 0</span>

            </div>

            <p id="websiteDescription"></p>

            <div id="websiteTags" class="tags"></div>

            <div class="website-buttons">

                <a id="visitWebsite"
                   class="visit-btn"
                   href="#"
                   target="_blank">
                    Visit Website →
                </a>

                <button class="favorite">
                    ❤ Favorite
                </button>

            </div>

        </div>

    </section>

    <section>

        <h2>Similar Websites</h2>

        <div id="similarWebsites" class="card-grid"></div>

    </section>

</main>

<footer>

    <div class="footer-links">
        <a href="#">About</a>
        <a href="#">Categories</a>
        <a href="#">Collections</a>
        <a href="#">Submit</a>
        <a href="#">Contact</a>
    </div>

    <p>© 2026 WebHunt. Discover the web.</p>

</footer>

<script src="js/app.js"></script>
<script src="js/website.js"></script>

</body>
</html>
