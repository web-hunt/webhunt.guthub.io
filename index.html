<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebHunt</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>

<a href="index.html" class="logo">

<svg
class="logo-icon"
width="36"
height="36"
viewBox="0 0 100 100"
xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">

<stop offset="0%" stop-color="#3b82f6"/>

<stop offset="100%" stop-color="#8b5cf6"/>

</linearGradient>

</defs>

<circle
cx="50"
cy="50"
r="42"
fill="none"
stroke="url(#logoGradient)"
stroke-width="8"/>

<path
d="M50 18 L78 50 L50 82 L22 50 Z"
fill="none"
stroke="url(#logoGradient)"
stroke-width="7"
stroke-linejoin="round"/>

<circle
cx="50"
cy="50"
r="7"
fill="#ffffff"/>

</svg>

<span class="logo-text">

<span class="logo-web">Web</span><span class="logo-hunt">Hunt</span>

</span>

</a>

<nav id="navbar">

<a href="index.html">Home</a>

<a href="#">Categories</a>

<a href="#">Collections</a>

<a href="favorites.html">Favorites</a>

<span id="authLinks">

<a href="login.html">Login</a>

</span>

</nav>

</header>

<main>

<section class="hero">

<h1>Discover the Best Websites</h1>

<p>
Search thousands of useful websites.
</p>

<input
id="searchInput"
type="search"
placeholder="🔍 Search websites...">

</section>

<section class="filters">

<h2>Filters</h2>

<div class="filter-grid">

<div>

<label>Category</label>

<select id="categoryFilter">

<option value="all">
All Categories
</option>

<option>AI</option>

<option>Photo</option>

<option>Files</option>

<option>Fun</option>

</select>

</div>

<div>

<label>Sort</label>

<select id="sortFilter">

<option value="popular">
Most Popular
</option>

<option value="rating">
Highest Rated
</option>

<option value="az">
A-Z
</option>

<option value="random">
Random
</option>

</select>

</div>

</div>

<div class="checkboxes">

<label>

<input
type="checkbox"
id="trendingFilter">

Trending

</label>

<label>

<input
type="checkbox"
id="hiddenFilter">

Hidden Gems

</label>

<label>

<input
type="checkbox"
id="recentFilter">

Recently Added

</label>

</div>

</section>

<section>

<h2 id="resultTitle">
Results
</h2>

<div class="card-grid">

</div>

</section>

</main>

<footer>

<p>

© 2026 WebHunt

</p>

</footer>

<script src="js/app.js"></script>

</body>
</html>
