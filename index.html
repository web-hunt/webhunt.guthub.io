<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebHunt</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>

    <div class="logo">
        🌐 <span>WebHunt</span>
    </div>

    <nav>
        <a href="#">Home</a>
        <a href="#">Categories</a>
        <a href="#">Collections</a>
        <a href="#">Favorites</a>
        <a href="#">About</a>
    </nav>

</header>

<main>

<section class="hero">

<h1>Discover the Best Websites</h1>

<p>
Search thousands of useful websites.
</p>

<input
id="searchInput"
type="search"
placeholder="🔍 Search websites...">

</section>

<section class="filters">

<h2>Filters</h2>

<div class="filter-grid">

<div>

<label>Category</label>

<select id="categoryFilter">

<option value="all">
All Categories
</option>

<option>AI</option>

<option>Photo</option>

<option>Files</option>

<option>Fun</option>

</select>

</div>

<div>

<label>Sort</label>

<select id="sortFilter">

<option value="popular">
Most Popular
</option>

<option value="rating">
Highest Rated
</option>

<option value="az">
A-Z
</option>

<option value="random">
Random
</option>

</select>

</div>

</div>

<div class="checkboxes">

<label>

<input
type="checkbox"
id="trendingFilter">

Trending

</label>

<label>

<input
type="checkbox"
id="hiddenFilter">

Hidden Gems

</label>

<label>

<input
type="checkbox"
id="recentFilter">

Recently Added

</label>

</div>

</section>

<section>

<h2 id="resultTitle">
Results
</h2>

<div class="card-grid">

</div>

</section>

</main>

<footer>

<p>

© 2026 WebHunt

</p>

</footer>

<script src="js/app.js"></script>

</body>
</html>
