<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebHunt - Discover the Best Websites</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <h1>WebHunt</h1>

        <nav>
            <a href="#">Home</a>
            <a href="#">Categories</a>
            <a href="#">Collections</a>
            <a href="#">Submit</a>
            <a href="#">About</a>
        </nav>
    </header>

    <main>

        <section class="hero">

            <h2>Discover the Best Websites.</h2>

            <p>Find useful tools, AI, games, learning resources and more.</p>

            <input
                type="search"
                placeholder="Search websites..."
            >

        </section>

        <section class="featured">

            <h2>Featured Categories</h2>

            <div class="categories">

            </div>

        </section>

        <section class="trending">

            <h2>🔥 Trending</h2>

            <div class="card-grid">

                <div class="card">

                    <img src="https://placehold.co/64" alt="Logo">

                    <h3>Photopea</h3>

                    <p>Free online Photoshop alternative.</p>

                    <div class="tags">
                        <span class="tag">Free</span>
                        <span class="tag">Photo</span>
                        <span class="tag">Editing</span>
                    </div>

                </div>

            </div>

        </section>

        <section class="hidden-gems">

            <h2>💎 Hidden Gems</h2>

            <div class="card-grid">

            </div>

        </section>

    </main>

</body>
</html>
