<!-- login.html -->

<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login • WebHunt</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/auth.css">

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<h1>Welcome Back</h1>

<p>
Sign in to your WebHunt account.
</p>

<form id="loginForm">

<input
type="email"
id="loginEmail"
placeholder="Email"
required>

<input
type="password"
id="loginPassword"
placeholder="Password"
required>

<button
type="submit">

Login

</button>

</form>

<button
id="googleLogin"
class="google-btn">

Continue with Google

</button>

<p>

Don't have an account?

<a href="signup.html">

Create one

</a>

</p>

</div>

</div>

<script type="module" src="js/firebase.js"></script>

<script type="module" src="js/auth.js"></script>

</body>
</html>
